<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mapa Perú</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family: Arial; }
#map { height:90vh; }

#filtros {
  padding:10px;
  background:#f4f4f4;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

select, input {
  padding:6px;
}
</style>
</head>

<body>

<div id="filtros">
  <input type="text" id="buscar" placeholder="Buscar distrito...">

  <select id="filtroResultado">
    <option value="">Resultado</option>
    <option value="conforme">Conforme</option>
    <option value="no">No Conforme</option>
  </select>

  <select id="filtroTipo">
    <option value="">Tipo</option>
    <option value="ipress">IPRESS</option>
    <option value="saneamiento">Emp. Saneamiento</option>
    <option value="fabricante">Fabricante</option>
    <option value="importador">Importador</option>
  </select>

  <select id="filtroMes">
    <option value="">Mes</option>
    <option value="enero">Enero</option>
    <option value="febrero">Febrero</option>
    <option value="marzo">Marzo</option>
  </select>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

  var map = L.map('map').setView([-12.04, -77.03], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  var markers = [];
  var dataGlobal = [];

  function limpiar(txt){
    return (txt||"").toString().toLowerCase().trim();
  }

  function crearIcono(url){
    return L.divIcon({
      html: `<img src="${url}" width="35">`,
      className:'',
      iconSize:[35,35],
      iconAnchor:[17,35]
    });
  }

  function icono(tipo, resultado){

    tipo = limpiar(tipo);
    resultado = limpiar(resultado);

    var esNo = resultado.includes("no");

    if(tipo.includes("ipress") || tipo.includes("saneamiento")){
      return esNo
        ? crearIcono('https://antonioxl1.github.io/MAPA/iconos/ipress_rojo.png')
        : crearIcono('https://antonioxl1.github.io/MAPA/iconos/ipress_verde.png');
    }

    if(tipo.includes("fabricante")){
      return esNo
        ? crearIcono('https://antonioxl1.github.io/MAPA/iconos/fabrica_rojo.png')
        : crearIcono('https://antonioxl1.github.io/MAPA/iconos/fabrica_verde.png');
    }

    if(tipo.includes("importador")){
      return esNo
        ? crearIcono('https://antonioxl1.github.io/MAPA/iconos/fabricante_rojo.png')
        : crearIcono('https://antonioxl1.github.io/MAPA/iconos/fabricante_verde.png');
    }

    return crearIcono('https://antonioxl1.github.io/MAPA/iconos/ipress_verde.png');
  }

  function dibujar(data){
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    data.forEach(d => {
      var m = L.marker([d.lat, d.lng], {
        icon: icono(d.tipo, d.resultado)
      }).addTo(map);

      markers.push(m);
    });
  }

  // 🔥 FILTRO REAL CORREGIDO
  function filtrar(){

    var texto = limpiar(document.getElementById("buscar").value);
    var res = limpiar(document.getElementById("filtroResultado").value);
    var tipo = limpiar(document.getElementById("filtroTipo").value);
    var mes = limpiar(document.getElementById("filtroMes").value);

    var filtrados = dataGlobal.filter(d => {

      var dRes = limpiar(d.resultado);
      var dTipo = limpiar(d.tipo);
      var dMes = limpiar(d.mes);
      var dDistrito = limpiar(d.distrito);

      // RESULTADO
      var cumpleResultado = true;
      if(res === "conforme"){
        cumpleResultado = dRes.includes("conforme") && !dRes.includes("no");
      } 
      else if(res === "no"){
        cumpleResultado = dRes.includes("no");
      }

      // TIPO
      var cumpleTipo = !tipo || dTipo.includes(tipo);

      // MES
      var cumpleMes = !mes || dMes.includes(mes);

      // TEXTO
      var cumpleTexto = !texto || dDistrito.includes(texto);

      return cumpleResultado && cumpleTipo && cumpleMes && cumpleTexto;
    });

    dibujar(filtrados);
  }

  document.getElementById("buscar").oninput = filtrar;
  document.getElementById("filtroResultado").onchange = filtrar;
  document.getElementById("filtroTipo").onchange = filtrar;
  document.getElementById("filtroMes").onchange = filtrar;

  fetch("TU_CSV_AQUI")
  .then(r => r.text())
  .then(data => {

    var filas = data.split("\n");

    filas.slice(1).forEach(f => {

      var c = f.split(",");

      if(c.length < 6) return;

      var coords = c[1].split(",");

      if(coords.length < 2) return;

      dataGlobal.push({
        lat: parseFloat(coords[0]),
        lng: parseFloat(coords[1]),
        tipo: c[2],
        resultado: c[3],
        distrito: c[4],
        mes: c[5]
      });

    });

    dibujar(dataGlobal);
  });

});
</script>

</body>
</html>
