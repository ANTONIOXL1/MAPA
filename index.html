<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mapa Perú</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; width: 100%; }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {

  // 🇵🇪 MAPA INICIAL PERÚ
  var map = L.map('map').setView([-9.19, -75.0152], 6);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // 🔥 ICONOS (ASEGÚRATE QUE EXISTAN)
  var iconos = {
    ipress: L.icon({
      iconUrl: 'https://antonioxl1.github.io/MAPA/iconos/ipress_verde.png',
      iconSize: [35, 35],
      iconAnchor: [17, 35]
    }),
    saneamiento: L.icon({
      iconUrl: 'https://antonioxl1.github.io/MAPA/iconos/ipress_verde.png',
      iconSize: [35, 35],
      iconAnchor: [17, 35]
    }),
    fabricante: L.icon({
      iconUrl: 'https://antonioxl1.github.io/MAPA/iconos/fabrica_verde.png',
      iconSize: [35, 35],
      iconAnchor: [17, 35]
    }),
    importador: L.icon({
      iconUrl: 'https://antonioxl1.github.io/MAPA/iconos/fabricante_verde.png',
      iconSize: [35, 35],
      iconAnchor: [17, 35]
    }),
    default: L.icon({
      iconUrl: 'https://antonioxl1.github.io/MAPA/iconos/ipress_verde.png',
      iconSize: [35, 35],
      iconAnchor: [17, 35]
    })
  };

  // 🧪 PRUEBA (SI ESTO NO SALE → PROBLEMA DE ICONOS)
  L.marker([-12.0464, -77.0428], {
    icon: iconos.ipress
  }).addTo(map).bindPopup("PRUEBA LIMA");

  // 📡 CARGAR CSV
  fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vT5Mq_bCbWMooRZGFoXCVe4vt4vVlnWOaDwADRnO-pkNsC17935tuPbSzlwmT8MJUEF_oEzsGt37kEw/pub?gid=306903085&single=true&output=csv")
    .then(res => res.text())
    .then(data => {

      var filas = data.split("\n");

      filas.slice(1).forEach(fila => {

        if (!fila) return;

        var columnas = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

        if (columnas.length < 3) return;

        var ubicacion = (columnas[2] || "").replace(/"/g, '').trim();
        var tipo = (columnas[3] || "").toLowerCase().trim();

        if (!ubicacion.includes(",")) return;

        var coords = ubicacion.split(",");
        var lat = parseFloat(coords[0]);
        var lng = parseFloat(coords[1]);

        if (isNaN(lat) || isNaN(lng)) return;

        // 🔥 ASIGNAR ICONO
        var icono = iconos.default;

        if (tipo.includes("ipress")) {
          icono = iconos.ipress;
        }
        else if (tipo.includes("saneamiento")) {
          icono = iconos.saneamiento;
        }
        else if (tipo.includes("fabricante")) {
          icono = iconos.fabricante;
        }
        else if (tipo.includes("importador")) {
          icono = iconos.importador;
        }

        // 📍 CREAR MARCADOR
        L.marker([lat, lng], { icon: icono })
          .addTo(map)
          .bindPopup("Tipo: " + tipo);

      });

    })
    .catch(err => {
      console.error(err);
      alert("Error cargando CSV");
    });

});
</script>

</body>
</html>
