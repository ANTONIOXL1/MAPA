<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mapa Perú FINAL PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family: Arial; }
#map { height:90vh; }

#filtros {
  padding:10px;
  background:#f4f4f4;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

select, input {
  padding:6px;
}
</style>
</head>

<body>

<div id="filtros">
  <input type="text" id="buscar" placeholder="Buscar distrito...">

  <select id="filtroResultado">
    <option value="">Resultado</option>
    <option value="conforme">Conforme</option>
    <option value="no">No Conforme</option>
  </select>

  <select id="filtroTipo">
    <option value="">Tipo</option>
    <option value="ipress">IPRESS</option>
    <option value="saneamiento">Saneamiento</option>
    <option value="fabricante">Fabricante</option>
    <option value="importador">Importador</option>
  </select>

  <select id="filtroMes">
    <option value="">Mes</option>
    <option value="enero">Enero</option>
    <option value="febrero">Febrero</option>
    <option value="marzo">Marzo</option>
  </select>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

  var map = L.map('map').setView([-12.04, -77.03], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  var markers = [];
  var dataGlobal = [];

  function limpiar(txt){
    return (txt||"").toString().toLowerCase().trim();
  }

  function limpiarTexto(txt){
    return (txt||"").toString().replace(/"/g,'').trim();
  }

  function crearIcono(url){
    return L.divIcon({
      html: `<img src="${url}" width="35" onerror="this.src='https://cdn-icons-png.flaticon.com/512/252/252025.png'">`,
      className:'',
      iconSize:[35,35],
      iconAnchor:[17,35]
    });
  }

  function icono(tipo, resultado){

    tipo = limpiar(tipo);
    resultado = limpiar(resultado);

    var esNo = resultado.includes("no");
    var esSi = resultado.includes("conforme") && !resultado.includes("no");

    // IPRESS / SANEAMIENTO
    if(tipo.includes("ipress") || tipo.includes("saneamiento")){
      if(esNo) return crearIcono('https://antonioxl1.github.io/MAPA/iconos/ipress_rojo.png');
      if(esSi) return crearIcono('https://antonioxl1.github.io/MAPA/iconos/ipress_verde.png');
    }

    // FABRICANTE
    if(tipo.includes("fabricante")){
      if(esNo) return crearIcono('https://antonioxl1.github.io/MAPA/iconos/fabrica_rojo.png');
      if(esSi) return crearIcono('https://antonioxl1.github.io/MAPA/iconos/fabrica_verde.png');
    }

    // IMPORTADOR
    if(tipo.includes("importador")){
      if(esNo) return crearIcono('https://antonioxl1.github.io/MAPA/iconos/fabricante_rojo.png');
      if(esSi) return crearIcono('https://antonioxl1.github.io/MAPA/iconos/fabricante_verde.png');
    }

    // SI FALLA TODO
    return crearIcono('https://cdn-icons-png.flaticon.com/512/252/252025.png');
  }

  function dibujar(data){

    markers.forEach(m => map.removeLayer(m));
    markers = [];

    data.forEach(d => {

      var m = L.marker([d.lat, d.lng], {
        icon: icono(d.tipo, d.resultado)
      })
      .addTo(map)
      .bindPopup(`
        <b>${d.direccion || "Sin dirección"}</b><br>
        📍 ${d.distrito || "Sin distrito"}<br>
        📅 ${d.mes || "Sin mes"}<br>
        ⚠️ ${d.resultado || "Sin resultado"}<br>
        🛑 ${d.medida || "Sin medida"}
      `);

      markers.push(m);
    });
  }

  function filtrar(){

    var texto = limpiar(document.getElementById("buscar").value);
    var res = limpiar(document.getElementById("filtroResultado").value);
    var tipo = limpiar(document.getElementById("filtroTipo").value);
    var mes = limpiar(document.getElementById("filtroMes").value);

    var filtrados = dataGlobal.filter(d => {

      var dRes = limpiar(d.resultado);
      var dTipo = limpiar(d.tipo);
      var dMes = limpiar(d.mes);
      var dDistrito = limpiar(d.distrito);

      var cumpleResultado = true;

      if(res === "conforme"){
        cumpleResultado = dRes.includes("conforme") && !dRes.includes("no");
      }
      else if(res === "no"){
        cumpleResultado = dRes.includes("no");
      }

      var cumpleTipo = !tipo || dTipo.includes(tipo);
      var cumpleMes = !mes || dMes.includes(mes);
      var cumpleTexto = !texto || dDistrito.includes(texto);

      return cumpleResultado && cumpleTipo && cumpleMes && cumpleTexto;
    });

    dibujar(filtrados);
  }

  document.getElementById("buscar").oninput = filtrar;
  document.getElementById("filtroResultado").onchange = filtrar;
  document.getElementById("filtroTipo").onchange = filtrar;
  document.getElementById("filtroMes").onchange = filtrar;

  fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vT5Mq_bCbWMooRZGFoXCVe4vt4vVlnWOaDwADRnO-pkNsC17935tuPbSzlwmT8MJUEF_oEzsGt37kEw/pub?gid=306903085&single=true&output=csv")
  .then(r => r.text())
  .then(data => {

    var filas = data.split("\n");

    filas.slice(1).forEach(f => {

      if(!f.trim()) return;

      var c = f.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

      var ubic = limpiarTexto(c[1]);
      if(!ubic.includes(",")) return;

      var coords = ubic.split(",");
      var lat = parseFloat(coords[0]);
      var lng = parseFloat(coords[1]);

      if(isNaN(lat) || isNaN(lng)) return;

      dataGlobal.push({
        lat: lat,
        lng: lng,
        direccion: limpiarTexto(c[0]),
        tipo: limpiarTexto(c[2]),
        resultado: limpiarTexto(c[3]),
        distrito: limpiarTexto(c[4]),
        mes: limpiarTexto(c[5]),
        medida: limpiarTexto(c[6])
      });

    });

    dibujar(dataGlobal);

  });

});
</script>

</body>
</html>
