<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Perú PRO - Monitoreo de Establecimientos</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f2f5;
  }

  #map {
    height: calc(100vh - 80px);
    width: 100%;
  }

  /* Panel de filtros mejorado */
  #filtros {
    background: white;
    padding: 12px 20px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    border-bottom: 1px solid #e0e0e0;
    position: relative;
    z-index: 1000;
  }

  .filtro-group {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #f8f9fa;
    padding: 5px 12px;
    border-radius: 8px;
    border: 1px solid #e0e0e0;
  }

  .filtro-group label {
    font-size: 13px;
    font-weight: 600;
    color: #495057;
  }

  select, input {
    padding: 8px 12px;
    border: 1px solid #ced4da;
    border-radius: 6px;
    font-size: 14px;
    background: white;
    cursor: pointer;
    transition: all 0.2s;
  }

  select:hover, input:hover {
    border-color: #80bdff;
  }

  select:focus, input:focus {
    outline: none;
    border-color: #007bff;
    box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
  }

  #buscar {
    min-width: 200px;
  }

  .contador {
    margin-left: auto;
    background: #007bff;
    color: white;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: bold;
  }

  @media (max-width: 768px) {
    #filtros {
      padding: 10px;
      gap: 8px;
    }
    
    .filtro-group {
      flex: 1;
      min-width: calc(50% - 20px);
    }
    
    #buscar {
      min-width: auto;
    }
    
    .contador {
      margin-left: 0;
      width: 100%;
      text-align: center;
    }
  }

  /* Estilos para el popup */
  .custom-popup .popup-title {
    font-weight: bold;
    font-size: 14px;
    margin-bottom: 5px;
    color: #007bff;
  }
  
  .custom-popup .popup-detail {
    font-size: 12px;
    color: #6c757d;
    margin-top: 3px;
  }
  
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: bold;
    margin-top: 5px;
  }
  
  .badge-conforme {
    background: #d4edda;
    color: #155724;
  }
  
  .badge-no-conforme {
    background: #f8d7da;
    color: #721c24;
  }
</style>
</head>
<body>

<div id="filtros">
  <div class="filtro-group">
    <label>🔍 Buscar:</label>
    <input type="text" id="buscar" placeholder="Distrito...">
  </div>

  <div class="filtro-group">
    <label>✅ Resultado:</label>
    <select id="filtroResultado">
      <option value="">Todos</option>
      <option value="Conforme">Conforme</option>
      <option value="No Conforme">No Conforme</option>
    </select>
  </div>

  <div class="filtro-group">
    <label>🏢 Tipo:</label>
    <select id="filtroTipo">
      <option value="">Todos</option>
      <option value="IPRESS">IPRESS</option>
      <option value="Emp. Saneamiento">Emp. Saneamiento</option>
      <option value="Fabricante">Fabricante</option>
      <option value="Importador">Importador</option>
    </select>
  </div>

  <div class="filtro-group">
    <label>📅 Mes:</label>
    <select id="filtroMes">
      <option value="">Todos</option>
      <option value="Enero">Enero</option>
      <option value="Febrero">Febrero</option>
      <option value="Marzo">Marzo</option>
    </select>
  </div>

  <div class="contador" id="contador">0 establecimientos</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {

  // Inicializar mapa
  var map = L.map('map').setView([-9.19, -75.0152], 6);
  
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
  }).addTo(map);

  // Variables globales
  var markers = [];
  var dataGlobal = [];

  // Función para normalizar texto
  function limpiar(txt) {
    if (!txt) return "";
    return String(txt).toLowerCase().trim();
  }

  // Función para determinar si es conforme o no conforme
  function esConforme(resultado) {
    const resultadoLower = limpiar(resultado);
    // Primero verificar si es "no conforme" (contiene "no")
    if (resultadoLower.includes("no")) {
      return false;
    }
    // Si no contiene "no", verificar si es "conforme"
    if (resultadoLower.includes("conforme")) {
      return true;
    }
    // Por defecto, si no se puede determinar, asumir conforme
    return true;
  }

  // Función para obtener el estado normalizado (CONFORME o NO CONFORME)
  function obtenerEstado(resultado) {
    return esConforme(resultado) ? "Conforme" : "No Conforme";
  }

  // Función para crear íconos con colores según conformidad
  function crearIcono(tipo, resultado) {
    tipo = limpiar(tipo);
    const conforme = esConforme(resultado);
    
    // Para IPRESS y Empresas de Saneamiento
    if (tipo.includes("ipress") || tipo.includes("saneamiento")) {
      if (!conforme) {
        return L.icon({
          iconUrl: 'https://antonioxl1.github.io/MAPA/iconos/ipress_rojo.png',
          iconSize: [32, 32],
          iconAnchor: [16, 32],
          popupAnchor: [0, -32]
        });
      } else {
        return L.icon({
          iconUrl: 'https://antonioxl1.github.io/MAPA/iconos/ipress_verde.png',
          iconSize: [32, 32],
          iconAnchor: [16, 32],
          popupAnchor: [0, -32]
        });
      }
    }
    
    // Para Fabricantes
    if (tipo.includes("fabricante")) {
      if (!conforme) {
        return L.icon({
          iconUrl: 'https://antonioxl1.github.io/MAPA/iconos/fabrica_rojo.png',
          iconSize: [32, 32],
          iconAnchor: [16, 32],
          popupAnchor: [0, -32]
        });
      } else {
        return L.icon({
          iconUrl: 'https://antonioxl1.github.io/MAPA/iconos/fabrica_verde.png',
          iconSize: [32, 32],
          iconAnchor: [16, 32],
          popupAnchor: [0, -32]
        });
      }
    }
    
    // Para Importadores
    if (tipo.includes("importador")) {
      if (!conforme) {
        return L.icon({
          iconUrl: 'https://antonioxl1.github.io/MAPA/iconos/fabricante_rojo.png',
          iconSize: [32, 32],
          iconAnchor: [16, 32],
          popupAnchor: [0, -32]
        });
      } else {
        return L.icon({
          iconUrl: 'https://antonioxl1.github.io/MAPA/iconos/fabricante_verde.png',
          iconSize: [32, 32],
          iconAnchor: [16, 32],
          popupAnchor: [0, -32]
        });
      }
    }
    
    // Ícono por defecto (verde)
    return L.icon({
      iconUrl: 'https://antonioxl1.github.io/MAPA/iconos/fabricante_verde.png',
      iconSize: [32, 32],
      iconAnchor: [16, 32],
      popupAnchor: [0, -32]
    });
  }

  // Función para dibujar marcadores en el mapa
  function dibujar(data) {
    // Limpiar marcadores existentes
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    
    // Actualizar contador
    document.getElementById("contador").textContent = `${data.length} establecimientos`;
    
    // Agregar nuevos marcadores
    data.forEach(d => {
      var marker = L.marker([d.lat, d.lng], {
        icon: crearIcono(d.tipo, d.resultado)
      }).addTo(map);
      
      // Crear contenido del popup
      const conforme = esConforme(d.resultado);
      const resultadoClass = conforme ? "badge-conforme" : "badge-no-conforme";
      const resultadoText = conforme ? "✅ Conforme" : "❌ No Conforme";
      
      marker.bindPopup(`
        <div class="custom-popup" style="min-width: 220px;">
          <div class="popup-title">📍 ${d.direccion || 'Dirección no especificada'}</div>
          <div class="popup-detail">🏙️ Distrito: ${d.distrito || 'No especificado'}</div>
          <div class="popup-detail">🏢 Tipo: ${d.tipo || 'No especificado'}</div>
          <div class="popup-detail">📅 Mes: ${d.mes || 'No especificado'}</div>
          <div class="badge ${resultadoClass}" style="margin-top: 8px;">${resultadoText}</div>
          <div class="popup-detail" style="font-size: 10px; color: #999; margin-top: 5px;">Dato original: ${d.resultado}</div>
        </div>
      `, { maxWidth: 300 });
      
      markers.push(marker);
    });
    
    // Si hay datos, ajustar el zoom para mostrar todos los marcadores
    if (data.length > 0 && markers.length > 0) {
      var group = L.featureGroup(markers);
      map.fitBounds(group.getBounds().pad(0.1));
    }
  }

  // Función para filtrar datos (CORREGIDA)
  function filtrar() {
    const texto = limpiar(document.getElementById("buscar").value);
    const filtroResultado = document.getElementById("filtroResultado").value;
    const filtroTipo = document.getElementById("filtroTipo").value;
    const filtroMes = document.getElementById("filtroMes").value;
    
    const filtrados = dataGlobal.filter(d => {
      // Filtro por texto (distrito)
      const matchTexto = !texto || limpiar(d.distrito).includes(texto);
      
      // Filtro por resultado (CORREGIDO)
      let matchResultado = true;
      if (filtroResultado) {
        const estadoItem = obtenerEstado(d.resultado);
        matchResultado = estadoItem === filtroResultado;
      }
      
      // Filtro por tipo
      let matchTipo = true;
      if (filtroTipo) {
        matchTipo = limpiar(d.tipo) === limpiar(filtroTipo);
      }
      
      // Filtro por mes
      let matchMes = true;
      if (filtroMes) {
        matchMes = limpiar(d.mes) === limpiar(filtroMes);
      }
      
      return matchTexto && matchResultado && matchTipo && matchMes;
    });
    
    console.log(`Filtro aplicado: Total: ${dataGlobal.length}, Filtrados: ${filtrados.length}`);
    console.log("Valor del filtro resultado:", filtroResultado);
    console.log("Primeros 3 items con su estado:", filtrados.slice(0, 3).map(d => ({
      original: d.resultado,
      estado: obtenerEstado(d.resultado)
    })));
    
    dibujar(filtrados);
  }

  // Configurar eventos de los filtros
  document.getElementById("buscar").addEventListener("input", filtrar);
  document.getElementById("filtroResultado").addEventListener("change", filtrar);
  document.getElementById("filtroTipo").addEventListener("change", filtrar);
  document.getElementById("filtroMes").addEventListener("change", filtrar);
  
  // Cargar datos desde Google Sheets
  const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT5Mq_bCbWMooRZGFoXCVe4vt4vVlnWOaDwADRnO-pkNsC17935tuPbSzlwmT8MJUEF_oEzsGt37kEw/pub?gid=306903085&single=true&output=csv";
  
  fetch(csvUrl)
    .then(response => {
      if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
      }
      return response.text();
    })
    .then(csvText => {
      console.log("CSV cargado");
      
      const lineas = csvText.split("\n");
      let datosCargados = 0;
      let errores = 0;
      
      // Saltar encabezado
      for (let i = 1; i < lineas.length; i++) {
        const linea = lineas[i].trim();
        if (!linea) continue;
        
        try {
          // Parsear CSV
          const columnas = linea.split(',');
          
          if (columnas.length < 7) {
            continue;
          }
          
          // Limpiar comillas de cada campo
          const col = columnas.map(c => c.replace(/^"|"$/g, '').trim());
          
          const ubic = col[2] || "";
          if (!ubic.includes(",")) {
            continue;
          }
          
          const coordenadas = ubic.split(",");
          const lat = parseFloat(coordenadas[0]);
          const lng = parseFloat(coordenadas[1]);
          
          if (isNaN(lat) || isNaN(lng)) {
            continue;
          }
          
          const registro = {
            lat: lat,
            lng: lng,
            direccion: col[1] || "Sin dirección",
            tipo: col[3] || "No especificado",
            resultado: col[4] || "No especificado",
            distrito: col[5] || "Sin distrito",
            mes: col[6] || "Sin mes"
          };
          
          console.log(`Registro ${i}:`, {
            tipo: registro.tipo,
            resultado: registro.resultado,
            estado: obtenerEstado(registro.resultado)
          });
          
          dataGlobal.push(registro);
          datosCargados++;
          
        } catch (e) {
          errores++;
          console.warn(`Error procesando línea ${i}:`, e);
        }
      }
      
      console.log(`✅ Cargados ${datosCargados} registros, ${errores} errores`);
      console.log("Estados encontrados:", [...new Set(dataGlobal.map(d => obtenerEstado(d.resultado)))]);
      
      if (dataGlobal.length === 0) {
        console.warn("⚠️ No se encontraron datos, usando datos de ejemplo");
        dataGlobal.push(
          { lat: -12.0464, lng: -77.0428, direccion: "Centro de Salud Miraflores", tipo: "IPRESS", resultado: "Conforme", distrito: "Miraflores", mes: "Enero" },
          { lat: -12.1, lng: -77.05, direccion: "Clínica San Pablo", tipo: "IPRESS", resultado: "No Conforme", distrito: "San Isidro", mes: "Febrero" },
          { lat: -12.09, lng: -77.03, direccion: "Fábrica Textil Perú", tipo: "Fabricante", resultado: "Conforme", distrito: "La Victoria", mes: "Enero" },
          { lat: -12.07, lng: -77.04, direccion: "Importadora Global SAC", tipo: "Importador", resultado: "No Conforme", distrito: "Lince", mes: "Marzo" },
          { lat: -8.115, lng: -79.028, direccion: "Empresa Aguas de Trujillo", tipo: "Emp. Saneamiento", resultado: "Conforme", distrito: "Trujillo", mes: "Febrero" }
        );
      }
      
      dibujar(dataGlobal);
    })
    .catch(error => {
      console.error("❌ Error cargando datos:", error);
      dataGlobal.push(
        { lat: -12.0464, lng: -77.0428, direccion: "Centro de Salud Miraflores", tipo: "IPRESS", resultado: "Conforme", distrito: "Miraflores", mes: "Enero" },
        { lat: -12.1, lng: -77.05, direccion: "Clínica San Pablo", tipo: "IPRESS", resultado: "No Conforme", distrito: "San Isidro", mes: "Febrero" },
        { lat: -12.09, lng: -77.03, direccion: "Fábrica Textil Perú", tipo: "Fabricante", resultado: "Conforme", distrito: "La Victoria", mes: "Enero" },
        { lat: -12.07, lng: -77.04, direccion: "Importadora Global SAC", tipo: "Importador", resultado: "No Conforme", distrito: "Lince", mes: "Marzo" },
        { lat: -8.115, lng: -79.028, direccion: "Empresa Aguas de Trujillo", tipo: "Emp. Saneamiento", resultado: "Conforme", distrito: "Trujillo", mes: "Febrero" }
      );
      dibujar(dataGlobal);
    });
});
</script>

</body>
</html>
