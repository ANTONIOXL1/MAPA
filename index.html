<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mapa Perú</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {

  var map = L.map('map').setView([-9.19, -75.0152], 6);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // ICONOS
  var iconos = {
    ipress: L.icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41]
    }),
    fabricante: L.icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41]
    }),
    saneamiento: L.icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-orange.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41]
    }),
    importador: L.icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-violet.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41]
    }),
    default: L.icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41]
    })
  };

  fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vT5Mq_bCbWMooRZGFoXCVe4vt4vVlnWOaDwADRnO-pkNsC17935tuPbSzlwmT8MJUEF_oEzsGt37kEw/pub?gid=306903085&single=true&output=csv")
    .then(res => res.text())
    .then(data => {

      var filas = data.split("\n");
      var bounds = [];

      filas.slice(1).forEach(fila => {

        // 🔥 dividir solo en 4 partes (para no romper la dirección)
        var columnas = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

        var ubicacion = (columnas[2] || "").replace(/"/g, '').trim();
        var tipo = (columnas[3] || "").toLowerCase();

        if (ubicacion.includes(",")) {

          var coords = ubicacion.split(",");

          var lat = parseFloat(coords[0]);
          var lng = parseFloat(coords[1]);

          if (!isNaN(lat) && !isNaN(lng)) {

            bounds.push([lat, lng]);

            var icono = iconos.default;

            if (tipo.includes("ipress")) icono = iconos.ipress;
            else if (tipo.includes("fabricante")) icono = iconos.fabricante;
            else if (tipo.includes("saneamiento")) icono = iconos.saneamiento;
            else if (tipo.includes("importador")) icono = iconos.importador;

            L.marker([lat, lng], { icon: icono }).addTo(map)
              .bindPopup("🏢 Tipo: " + tipo);
          }
        }

      });

      if (bounds.length > 0) {
        map.fitBounds(bounds);
      }

    })
    .catch(err => {
      console.error(err);
      alert("Error cargando datos");
    });

});
</script>

</body>
</html>
