<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mapa Perú</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {

  var map = L.map('map').setView([-9.19, -75.0152], 6);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // ICONOS
  var iconos = {
  ipress: L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/2966/2966488.png', // hospital
    iconSize: [30, 30]
  }),
  fabricante: L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/3063/3063821.png', // fábrica
    iconSize: [30, 30]
  }),
  saneamiento: L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/728/728093.png', // agua
    iconSize: [30, 30]
  }),
  importador: L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/2921/2921822.png', // caja
    iconSize: [30, 30]
  }),

  farmacia: L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/483/483361.png',
    iconSize: [30, 30]
  }),
  laboratorio: L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/535/535239.png',
    iconSize: [30, 30]
  }),

  default: L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
    iconSize: [30, 30]
  })
};

  fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vT5Mq_bCbWMooRZGFoXCVe4vt4vVlnWOaDwADRnO-pkNsC17935tuPbSzlwmT8MJUEF_oEzsGt37kEw/pub?gid=306903085&single=true&output=csv")
    .then(res => res.text())
    .then(data => {

      var filas = data.split("\n");
      var bounds = [];

      filas.slice(1).forEach(fila => {

        // 🔥 dividir solo en 4 partes (para no romper la dirección)
        var columnas = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

        var ubicacion = (columnas[2] || "").replace(/"/g, '').trim();
        var tipo = (columnas[3] || "").toLowerCase();

        if (ubicacion.includes(",")) {

          var coords = ubicacion.split(",");

          var lat = parseFloat(coords[0]);
          var lng = parseFloat(coords[1]);

          if (!isNaN(lat) && !isNaN(lng)) {

            bounds.push([lat, lng]);

            var icono = iconos.default;

           var icono = iconos.default;

// 🔥 condiciones inteligentes
if (tipo.includes("ipress") || tipo.includes("hospital") || tipo.includes("clinica")) {
  icono = iconos.ipress;
}
else if (tipo.includes("fabricante") || tipo.includes("industria")) {
  icono = iconos.fabricante;
}
else if (tipo.includes("saneamiento") || tipo.includes("agua")) {
  icono = iconos.saneamiento;
}
else if (tipo.includes("importador")) {
  icono = iconos.importador;
}
else if (tipo.includes("farmacia") || tipo.includes("botica")) {
  icono = iconos.farmacia;
}
else if (tipo.includes("laboratorio")) {
  icono = iconos.laboratorio;
}
            L.marker([lat, lng], { icon: icono }).addTo(map)
              .bindPopup("🏢 Tipo: " + tipo);
          }
        }

      });

      if (bounds.length > 0) {
        map.fitBounds(bounds);
      }

    })
    .catch(err => {
      console.error(err);
      alert("Error cargando datos");
    });

});
</script>

</body>
</html>
