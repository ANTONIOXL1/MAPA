<!DOCTYPE html>
<html>
<head>
    <title>Mapa</title>
    <meta charset="utf-8" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        #map {
            height: 100vh; /* IMPORTANTE */
            width: 100%;
        }
    </style>
</head>
<body>

<h2>MAPA</h2>
<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Crear mapa centrado en Lima
    var map = L.map('map').setView([-12.0464, -77.0428], 13);

    // Cargar mapa base
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // EJEMPLO de marcador
    L.marker([-12.0464, -77.0428])
        .addTo(map)
        .bindPopup("Ejemplo en Lima")
        .openPopup();
</script>

</body>
</html>
