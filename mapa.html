<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Mapa</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>

<body>

<div id="map"></div>

<script>

const map = L.map('map').setView([-9.19, -75.0152], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: 'Map'
}).addTo(map);

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT5Mq_bCbWMooRZGFoXCVe4vt4vVlnWOaDwADRnO-pkNsC17935tuPbSzlwmT8MJUEF_oEzsGt37kEw/pub?gid=306903085&single=true&output=csv";

fetch(url)
  .then(res => res.text())
  .then(data => {

    const filas = data.trim().split("\n").slice(1);
    const bounds = [];

    filas.forEach(fila => {

      const columnas = fila.split(",");

      const lat = parseFloat(columnas[2]);
      const lng = parseFloat(columnas[3]);
      const tipo = columnas[4];

      if (isNaN(lat) || isNaN(lng)) return;

      L.marker([lat, lng])
        .addTo(map)
        .bindPopup("Tipo: " + tipo);

      bounds.push([lat, lng]);

    });

    if (bounds.length > 0) {
      map.fitBounds(bounds);
    }

  });

</script>

</body>
</html>
